<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kingdom Apocalypse 3D</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial}
body{overflow:hidden;background:black}
#ui{
position:absolute;
top:15px;
left:15px;
z-index:10;
width:340px;
background:rgba(0,0,0,0.65);
backdrop-filter:blur(12px);
padding:18px;
border-radius:24px;
color:white;
border:1px solid rgba(255,255,255,0.15)
}
.title{font-size:32px;font-weight:bold;margin-bottom:10px}
.stat{margin-top:6px;font-size:15px}
button{
width:100%;
padding:12px;
border:none;
margin-top:8px;
border-radius:14px;
font-weight:bold;
cursor:pointer;
color:white;
font-size:15px;
transition:0.2s
}
button:hover{transform:scale(1.03)}
canvas{display:block}
#leaderboard{
margin-top:15px;
padding:10px;
border-radius:16px;
background:rgba(255,255,255,0.06)
}
</style>
</head>
<body>

<div id="ui">
<div class="title">☣️ Kingdom Survival</div>

<div class="stat">💰 Money: <span id="money">200</span></div>
<div class="stat">🍖 Food: <span id="food">100</span></div>
<div class="stat">💧 Water: <span id="water">100</span></div>
<div class="stat">👥 Citizens: <span id="citizens">5</span></div>
<div class="stat">🏠 Base HP: <span id="basehp">100</span>/100</div>
<div class="stat">⏱️ Survival Time: <span id="time">0</span>s</div>
<div class="stat">👹 Zombies: <span id="kills">0</span></div>

<button style="background:#64748b" onclick="setBuild('wall')">🧱 Build Wall</button>
<button style="background:#ef4444" onclick="setBuild('turret')">🤖 Build Turret</button>
<button style="background:#6b7280" onclick="setBuild('mine')">⛏️ Build Mine</button>
<button style="background:#7c3aed" onclick="setBuild('factory')">🏭 Build Factory</button>
<button style="background:#10b981" onclick="setBuild('market')">🏪 Build Market</button>
<button style="background:#84cc16" onclick="setBuild('farm')">🌾 Build Farm</button>
<button style="background:#0ea5e9" onclick="setBuild('water')">💧 Water Pump</button>

<div id="leaderboard">
<h3>🏆 Leaderboard</h3>
<div id="scores"></div>
</div>
</div>

<script type="module">
import * as THREE from 'https://unpkg.com/three@0.160.0/build/three.module.js';
import { OrbitControls } from 'https://unpkg.com/three@0.160.0/examples/jsm/controls/OrbitControls.js';

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x030712);
scene.fog = new THREE.Fog(0x030712,30,120);

const camera = new THREE.PerspectiveCamera(75,innerWidth/innerHeight,0.1,1000);
camera.position.set(18,18,18);

const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(innerWidth,innerHeight);
renderer.shadowMap.enabled = true;
document.body.appendChild(renderer.domElement);

const controls = new OrbitControls(camera,renderer.domElement);
controls.enableDamping = true;
controls.target.set(0,0,0);

const ambient = new THREE.AmbientLight(0xffffff,0.4);
scene.add(ambient);

const moon = new THREE.DirectionalLight(0xaaccff,2);
moon.position.set(20,30,10);
moon.castShadow = true;
scene.add(moon);

const ground = new THREE.Mesh(
new THREE.PlaneGeometry(200,200),
new THREE.MeshStandardMaterial({color:0x0f172a})
);
ground.rotation.x = -Math.PI/2;
ground.receiveShadow = true;
scene.add(ground);

const grid = new THREE.GridHelper(200,50,0x334155,0x1e293b);
scene.add(grid);

const home = new THREE.Mesh(
new THREE.BoxGeometry(6,6,6),
new THREE.MeshStandardMaterial({color:0xfacc15})
);
home.position.y = 3;
home.castShadow = true;
scene.add(home);

const player = new THREE.Mesh(
new THREE.BoxGeometry(1.5,2,1.5),
new THREE.MeshStandardMaterial({color:0x22c55e})
);
player.position.set(0,1,10);
player.castShadow = true;
scene.add(player);

let money = 200;
let food = 100;
let water = 100;
let citizens = 5;
let baseHP = 100;
let kills = 0;
let timeAlive = 0;
let buildMode = 'wall';

const zombies=[];
const bullets=[];
const buildings=[];
const turrets=[];
const keys={};

window.addEventListener('keydown',e=>keys[e.key.toLowerCase()]=true);
window.addEventListener('keyup',e=>keys[e.key.toLowerCase()]=false);

window.setBuild = (t)=>buildMode=t;

function ui(){
money=Math.max(0,money);
food=Math.max(0,food);
water=Math.max(0,water);

document.getElementById('money').innerText=Math.floor(money);
document.getElementById('food').innerText=Math.floor(food);
document.getElementById('water').innerText=Math.floor(water);
document.getElementById('citizens').innerText=citizens;
document.getElementById('basehp').innerText=Math.floor(baseHP);
document.getElementById('kills').innerText=kills;
document.getElementById('time').innerText=Math.floor(timeAlive);
}

function saveGame(){
localStorage.setItem('kingdom-survival-save',JSON.stringify({
money,food,water,citizens,baseHP,kills,timeAlive
}));
}

function loadGame(){
const save = JSON.parse(localStorage.getItem('kingdom-survival-save')||'null');
if(!save)return;
money=save.money;
food=save.food;
water=save.water;
citizens=save.citizens;
baseHP=save.baseHP;
kills=save.kills;
timeAlive=save.timeAlive;
}

loadGame();

function saveScore(){
const old = JSON.parse(localStorage.getItem('kingdom-scores')||'[]');
old.push({time:Math.floor(timeAlive),kills});
old.sort((a,b)=>b.time-a.time);
localStorage.setItem('kingdom-scores',JSON.stringify(old.slice(0,10)));
loadScores();
}

function loadScores(){
const scores = JSON.parse(localStorage.getItem('kingdom-scores')||'[]');
document.getElementById('scores').innerHTML = scores.map((s,i)=>`<div>#${i+1} - ${s.time}s / ${s.kills} kills</div>`).join('');
}

loadScores();

function buildStructure(type,x,z){
let cost=0;
let mesh;

if(type==='wall'){
cost=40;
mesh=new THREE.Mesh(
new THREE.BoxGeometry(4,3,1),
new THREE.MeshStandardMaterial({color:0x64748b})
);
}

if(type==='turret'){
cost=160;
mesh=new THREE.Mesh(
new THREE.CylinderGeometry(1,1,3,8),
new THREE.MeshStandardMaterial({color:0xef4444})
);
}

if(type==='mine'){
cost=80;
mesh=new THREE.Mesh(
new THREE.BoxGeometry(3,3,3),
new THREE.MeshStandardMaterial({color:0x6b7280})
);
}

if(type==='factory'){
cost=150;
mesh=new THREE.Mesh(
new THREE.BoxGeometry(4,5,4),
new THREE.MeshStandardMaterial({color:0x7c3aed})
);
}

if(type==='market'){
cost=220;
mesh=new THREE.Mesh(
new THREE.BoxGeometry(4,3,4),
new THREE.MeshStandardMaterial({color:0x10b981})
);
}

if(type==='farm'){
cost=100;
mesh=new THREE.Mesh(
new THREE.CylinderGeometry(2,2,1,8),
new THREE.MeshStandardMaterial({color:0x84cc16})
);
}

if(type==='water'){
cost=100;
mesh=new THREE.Mesh(
new THREE.CylinderGeometry(1,1,5,8),
new THREE.MeshStandardMaterial({color:0x0ea5e9})
);
}

if(money<cost)return;

money-=cost;

mesh.position.set(x,2,z);
mesh.castShadow=true;
mesh.receiveShadow=true;
scene.add(mesh);

const data={mesh,type,level:1,hp:100};
buildings.push(data);

if(type==='turret')turrets.push(data);
}

renderer.domElement.addEventListener('contextmenu',e=>e.preventDefault());
renderer.domElement.addEventListener('mousedown',(e)=>{
if(e.button!==2)return;

const mouse = new THREE.Vector2(
(e.clientX/innerWidth)*2-1,
-(e.clientY/innerHeight)*2+1
);

const ray = new THREE.Raycaster();
ray.setFromCamera(mouse,camera);
const hit = ray.intersectObject(ground);

if(hit.length>0){
const p = hit[0].point;
const gx = Math.round(p.x/4)*4;
const gz = Math.round(p.z/4)*4;
buildStructure(buildMode,gx,gz);
}
});

function zombie(){
const z = new THREE.Mesh(
new THREE.BoxGeometry(1.5,2,1.5),
new THREE.MeshStandardMaterial({color:0xef4444})
);

const angle = Math.random()*Math.PI*2;
const dist = 70;

z.position.set(Math.cos(angle)*dist,1,Math.sin(angle)*dist);
z.castShadow=true;
scene.add(z);

zombies.push({mesh:z,hp:3});
}

setInterval(zombie,2200);

window.addEventListener('click',()=>{
const bullet = new THREE.Mesh(
new THREE.SphereGeometry(0.2,8,8),
new THREE.MeshBasicMaterial({color:0xffff00})
);

bullet.position.copy(player.position);

const dir = new THREE.Vector3();
camera.getWorldDirection(dir);

bullets.push({mesh:bullet,vel:dir.multiplyScalar(1.5)});
scene.add(bullet);
});

function over(){
saveScore();
localStorage.removeItem('kingdom-survival-save');
alert('☠️ GAME OVER\nBạn sống được '+Math.floor(timeAlive)+' giây');
location.reload();
}

const clock = new THREE.Clock();

function animate(){
requestAnimationFrame(animate);

const dt = clock.getDelta();
timeAlive += dt;

if(keys['w'])player.position.z-=0.25;
if(keys['s'])player.position.z+=0.25;
if(keys['a'])player.position.x-=0.25;
if(keys['d'])player.position.x+=0.25;

food -= citizens*0.0015;
water -= citizens*0.0012;

if(food<=0||water<=0){
baseHP -= 0.01;
}

buildings.forEach(b=>{
if(b.type==='mine')money += 0.015*b.level;
if(b.type==='factory')money += 0.03*b.level;
if(b.type==='market')money += 0.05*b.level;
if(b.type==='farm')food += 0.015*b.level;
if(b.type==='water')water += 0.015*b.level;
});

zombies.forEach((z,zi)=>{
const dir = new THREE.Vector3(
0-z.mesh.position.x,
0,
0-z.mesh.position.z
).normalize();

z.mesh.position.add(dir.multiplyScalar(0.03));

if(z.mesh.position.distanceTo(home.position)<5){
baseHP -= 0.03;
}

bullets.forEach((b,bi)=>{
b.mesh.position.add(b.vel);
if(b.mesh.position.distanceTo(z.mesh.position)<1){
z.hp -= 1;
scene.remove(b.mesh);
if(z.hp<=0){
scene.remove(z.mesh);
zombies.splice(zi,1);
money += 25;
kills++;
}
}
});
});

turrets.forEach(t=>{
if(zombies[0]){
const target = zombies[0];
const bullet = new THREE.Mesh(
new THREE.SphereGeometry(0.15,8,8),
new THREE.MeshBasicMaterial({color:0x00ffff})
);

bullet.position.copy(t.mesh.position);

const dir = new THREE.Vector3(
target.mesh.position.x-t.mesh.position.x,
0,
target.mesh.position.z-t.mesh.position.z
).normalize();

bullets.push({mesh:bullet,vel:dir.multiplyScalar(0.5)});
scene.add(bullet);
}
});

if(baseHP<=0)over();

controls.update();
ui();
saveGame();
renderer.render(scene,camera);
}

animate();

addEventListener('resize',()=>{
camera.aspect=innerWidth/innerHeight;
camera.updateProjectionMatrix();
renderer.setSize(innerWidth,innerHeight);
});

</script>
</body>
</html>
